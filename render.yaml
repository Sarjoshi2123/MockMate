databases:
  - name: mockmate-db
    databaseName: interviewdb
    user: mockmate
    plan: free

services:
  - type: web
    name: mockmate-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile

    healthCheckPath: /actuator/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRATION_MS
        value: 86400000

      - key: DATABASE_URL
        fromDatabase:
          name: mockmate-db
          property: connectionString

      - key: ALLOWED_ORIGINS
        value: "*"
