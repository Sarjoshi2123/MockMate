# ─── Active profile (override with SPRING_PROFILES_ACTIVE env var on Render) ───
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# ─── Global settings (apply to all profiles) ───────────────────────────────────
server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# ─── Custom application configuration ──────────────────────────────────────────
app:
  jwtSecret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
  ai:
    provider: mock
  cors:
    allowedOrigins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

---
# ─── DEV profile (H2 in-memory) ────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:interviewdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

---
# ─── PROD profile (PostgreSQL on Render) ───────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
